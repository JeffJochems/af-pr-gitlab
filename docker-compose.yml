# Reuses pr-af's own docker-compose.yml service definitions near-verbatim
# (same two services, same env-var names for the AgentField/provider knobs).
# The `pr-af` service now builds from this repo's own ./Dockerfile rather than
# a pure remote build context — see .claude/steps/002-dockerfile-claude-code-
# -and-anthropic-routing/PLAN.md for why (claude-code needs
# agentfield[harness-claude], which upstream's own Dockerfile doesn't
# install; PLAN.md §3's original "zero Dockerfile" strategy is revised there,
# not silently overwritten here). Keep the pinned commit SHA (Dockerfile's
# PR_AF_PINNED_REF build arg) in sync with pyproject.toml's `pr-af @ git+...`
# pin.
services:
  agentfield:
    image: agentfield/control-plane:latest
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      - AF_MODE=dev
      - AGENTFIELD_HTTP_ADDR=0.0.0.0:8080
      - AGENTFIELD_STORAGE_MODE=local
    volumes:
      - agentfield-data:/data
    restart: unless-stopped

  pr-af:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - AGENTFIELD_SERVER=http://agentfield:8080
      - AGENTFIELD_API_KEY=${AGENTFIELD_API_KEY:-}
      - AGENT_CALLBACK_URL=http://pr-af:8004
      # Anthropic-direct wiring. .harness() calls (planner/reviewer/cross_ref/
      # adversary) use PR_AF_PROVIDER/PR_AF_MODEL directly (see PLAN.md §6).
      # .ai() calls (polish/merge-gate) go through docker/entrypoint_wrapper.py's
      # runtime override, which takes effect whenever ANTHROPIC_API_KEY is set —
      # falling back to pr-af's original OpenRouter behavior otherwise. Note
      # PR_AF_MODEL and PR_AF_AI_MODEL are deliberately different: claude_agent_sdk
      # (.harness()) wants a bare model id, litellm (.ai()) wants the "anthropic/"
      # prefix to route correctly.
      - PR_AF_PROVIDER=${PR_AF_PROVIDER:-claude-code}
      - PR_AF_MODEL=${PR_AF_MODEL:-claude-sonnet-4-5}
      - PR_AF_AI_MODEL=${PR_AF_AI_MODEL:-anthropic/claude-sonnet-4-5}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - XDG_DATA_HOME=/home/praf/.local/share
      - PR_AF_WORKDIR=/workspaces
    volumes:
      - pr-af-workspaces:/workspaces
      - opencode-data:/home/praf/.local/share
    depends_on:
      agentfield:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  agentfield-data:
  pr-af-workspaces:
  opencode-data:
